name: ForgeKit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run hard verification
        run: npm run verify

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - name: TypeScript type check (no emit)
        run: npx tsc --noEmit

  e2e-contract:
    name: E2E contract (inspect → plan → build)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run E2E pipeline tests
        run: npm test -- tests/e2e/full-pipeline.test.ts

  docker-smoke:
    name: Docker build smoke (real daemon)
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run inspect → plan → real docker build
        run: |
          node -e "
            const {executeTool} = require('./dist/mcp-server/tools/executor.js');
            (async () => {
              const dir = './tests/fixtures/sample-python-project';
              const insp = await executeTool('inspect_project', {source_dir: dir});
              console.log('inspect:', insp.status, insp.language);
              if (insp.status !== 'success') process.exit(1);

              const plan = await executeTool('generate_packaging_plan', {source_dir: dir, goals:['Docker'], target_environment:'ubuntu-22.04'});
              console.log('plan:', plan.status, plan.plan_path);
              if (plan.status !== 'success') process.exit(1);

              const build = await executeTool('build_docker_image', {source_dir: dir, plan_path: plan.plan_path, image_name:'forgekit-demo', tags:['smoke']});
              console.log('build:', build.status, build.image_ref, 'size=', build.size_bytes);
              if (build.status !== 'success') { console.error(JSON.stringify(build.error)); process.exit(1); }
              console.log('E2E real build OK');
            })().catch(e=>{console.error(e); process.exit(1);});
          "
      - name: Verify image runs
        run: |
          docker run --rm -d --name smoke-test -p 8080:8080 forgekit-demo:smoke
          sleep 3
          curl -sf http://localhost:8080/health || (echo "health check failed" && exit 1)
          docker stop smoke-test || true
